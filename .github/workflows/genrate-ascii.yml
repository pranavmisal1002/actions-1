name: Generate ASCII Artwork
on:
  push:
    branches:
      - main
jobs:
  generate_ascii_artwork:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List files
        run: ls -ltra

      - name: Executing shell script
        run: |
          chmod +x ascii-script.sh
          ./ascii-script.sh
    
      
        