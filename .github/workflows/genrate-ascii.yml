name: Generate ASCII Artwork
on:
  push:
    branches:
      - main
jobs:
  build_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: insall cowsay
        run: sudo apt-get install cowsay -y

      - name: Execute cowsay command
        run: cowsay -f dragon "run for cover, I am a dragon...RAWRRRR" >> dragon.txt

      - name: sleep for 30 sec
        run: sleep 30
    
  test_job:
    runs-on: ubuntu-latest
    #needs: build_job
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: sleep for 10 sec
        run: sleep 10

      - name: Test file exists
        run: grep -i "dragon" dragon.txt

  deploy_job:
    runs-on: ubuntu-latest
    steps:
      - name: Read file
        run: cat dragon.txt
     
      - name: deploy
        run: echo "Deploying...."
        
    
      
        